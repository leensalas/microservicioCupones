spring.application.name=cupones
# 1. Configuración del Servidor
server.port=8089

# 2. Configuración de la Base de Datos (Asegúrate de crear 'cupones' en MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/cupones?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Configuración de JPA / Hibernate
# Importante: ddl-auto=none porque Liquibase se encargará de las tablas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Configuración de Liquibase
spring.liquibase.enabled=true
# Ruta al archivo maestro que crearemos a continuación
spring.liquibase.change-log=classpath:db/changelog/db.cupones.sql
# Si quieres que borre y recree todo cada vez (solo para pruebas), usa 'true' en drop-first
spring.liquibase.drop-first=true
logging.level.com.productos.productos=DEBUG
logging.file.name=logs/microservicio-cupones.log

#para que reconosca los nombres de la base de datos con camelCase o no
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

#configuración Swagger
springdoc.swagger-ui.enabled=true
#Url del Swagger
springdoc.swagger-ui.path=/doc/swagger-ui.html
